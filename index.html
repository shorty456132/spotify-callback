<!DOCTYPE html>
<html>
<body style="font-family:monospace;background:#111;color:#1DB954;padding:40px">
  <h2>Spotify Auth Code</h2>
  <p style="color:#aaa">Paste this into the Q-SYS plugin AuthCode field:</p>
  <div id="code" style="font-size:13px;word-break:break-all;background:#222;
       padding:16px;border-radius:8px;color:#fff;margin-top:8px"></div>
  <script>
    const code = new URLSearchParams(window.location.search).get('code');
    document.getElementById('code').textContent = code || 'No code found.';
  </script>
</body>
</html>
